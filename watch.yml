---
# A deliberately slow job so you can watch output stream in live, test the
# "Cancel" button mid-run, and see how AWX records a cancelled job.
# Default run time is steps * delay_seconds = 10 * 3 = ~30 seconds.
- name: Watch a job run over time
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    steps: 10
    delay_seconds: 3
  tasks:
    - name: "Count to {{ steps }}, pausing between each step"
      ansible.builtin.debug:
        msg: "Step {{ item }} of {{ steps }}"
      loop: "{{ range(1, steps | int + 1) | list }}"
      loop_control:
        pause: "{{ delay_seconds | int }}"
