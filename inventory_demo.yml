---
# Demonstrates how Inventories, groups, and host limits work WITHOUT needing
# real machines to connect to. Point a Job Template at an inventory that has a
# few dummy hosts (see inventory/hosts.ini) and run this. Because connection is
# local, Ansible never actually SSHes anywhere - it just iterates the inventory.
# Try setting a LIMIT on the Job Template (e.g. "web" or "host01") to see how
# AWX scopes a run to a subset of hosts.
- name: Inspect the inventory (no real connections made)
  hosts: all
  connection: local
  gather_facts: false
  tasks:
    - name: Show this host and the groups it belongs to
      ansible.builtin.debug:
        msg: >-
          inventory_hostname={{ inventory_hostname }}
          groups={{ group_names }}
          custom_var={{ site | default('not set') }}
