---
# Demonstrates fact gathering and how AWX renders structured output.
# Run this once with the Job Template VERBOSITY set to 0 (Normal), then
# again at 3 (Debug) to see how AWX surfaces different detail levels.
- name: Show system facts
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Summarise the execution environment
      ansible.builtin.debug:
        msg: >-
          OS: {{ ansible_distribution | default('unknown') }}
          {{ ansible_distribution_version | default('') }} |
          Arch: {{ ansible_architecture | default('unknown') }} |
          Python: {{ ansible_python_version | default('unknown') }} |
          Hostname: {{ ansible_hostname | default('unknown') }}

    - name: Dump every gathered fact (lots of output)
      ansible.builtin.debug:
        var: ansible_facts
